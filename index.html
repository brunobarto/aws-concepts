<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title> AWS Main Concepts </title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="mac-window">

  <div class="title-bar">
    <div class="title-buttons">
      <div class="btn"></div>
      <div class="btn"></div>
    </div>
    <span>AWS Main Concepts</span>
  </div>

  <div class="content">

    <div class="mac-grid">
      <div class="mac-card" data-service="ec2">EC2<br><span>Run Apps</span></div>
      <div class="mac-card" data-service="s3">S3<br><span>Store Files</span></div>
      <div class="mac-card" data-service="iam">IAM<br><span>Manage Access</span></div>
      <div class="mac-card" data-service="rds">RDS<br><span>Databases</span></div>
      <div class="mac-card" data-service="lambda">Lambda<br><span>Serverless</span></div>
      <div class="mac-card" data-service="cloudwatch">CloudWatch<br><span>Monitor</span></div>
      <div class="mac-card" data-service="vpc">VPC<br><span>Network Setup</span></div>
    </div>

    <div class="info-panel">
      <h2 id="serviceTitle">Select a service</h2>
      <p id="serviceDesc">Select a tile to learn about an AWS service.</p>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
